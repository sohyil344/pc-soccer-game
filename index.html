<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوتبال ۲ نفره - نسخه حرفه‌ای</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: radial-gradient(circle at 50% 50%, #0a0e14, #000000);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow: hidden;
  }

  #gameContainer {
    position: relative;
    width: 1000px;
    height: 620px;
  }

  #scoreBoard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 25px;
    padding: 15px 50px;
    border: 2px solid #0f3460;
    box-shadow: 0 0 40px rgba(0,150,255,0.3), inset 0 0 20px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  #scoreBoard::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
    animation: shimmer 4s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
    100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
  }

  .playerScore {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .playerLabel {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .redLabel { 
    color: #ff4444; 
    text-shadow: 0 0 15px #ff4444, 0 0 30px #ff0000;
    animation: pulse-red 2.5s ease-in-out infinite;
  }
  
  .blueLabel { 
    color: #4488ff; 
    text-shadow: 0 0 15px #4488ff, 0 0 30px #0044ff;
    animation: pulse-blue 2.5s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { text-shadow: 0 0 15px #ff4444, 0 0 30px #ff0000; }
    50% { text-shadow: 0 0 25px #ff4444, 0 0 50px #ff0000, 0 0 70px #ff0000; }
  }

  @keyframes pulse-blue {
    0%, 100% { text-shadow: 0 0 15px #4488ff, 0 0 30px #0044ff; }
    50% { text-shadow: 0 0 25px #4488ff, 0 0 50px #0044ff, 0 0 70px #0044ff; }
  }

  .scoreNum {
    font-size: 56px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 25px rgba(255,255,255,0.6);
    line-height: 1;
    transition: transform 0.3s ease;
  }

  .scoreNum.scored {
    animation: scorePopup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes scorePopup {
    0% { transform: scale(1); }
    50% { transform: scale(1.6) rotate(8deg); }
    100% { transform: scale(1); }
  }

  .scoreSep {
    font-size: 40px;
    color: #666;
    font-weight: 300;
  }

  #timerDisplay {
    color: #bbb;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    transition: all 0.3s;
  }

  #timerDisplay.warning {
    color: #ff4444;
    animation: timerBlink 0.6s infinite;
    font-size: 17px;
  }

  @keyframes timerBlink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.1); }
  }

  canvas {
    border-radius: 15px;
    box-shadow: 
      0 0 80px rgba(0, 255, 100, 0.4),
      0 0 150px rgba(0, 150, 50, 0.25),
      inset 0 0 40px rgba(0,0,0,0.4);
    display: block;
    border: 3px solid rgba(0,255,100,0.2);
  }

  #controls {
    margin-top: 18px;
    display: flex;
    gap: 80px;
    color: #777;
    font-size: 13px;
    letter-spacing: 1.2px;
    font-weight: 500;
  }

  .ctrl-red { 
    color: #ff7777; 
    text-shadow: 0 0 10px rgba(255,100,100,0.3);
  }
  
  .ctrl-blue { 
    color: #77aaff; 
    text-shadow: 0 0 10px rgba(100,150,255,0.3);
  }

  #gameOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    display: none;
    z-index: 10;
    backdrop-filter: blur(15px);
  }

  #overlayTitle {
    font-size: 64px;
    font-weight: 900;
    margin-bottom: 15px;
    text-shadow: 0 0 40px currentColor;
    animation: titleFloat 2.5s ease-in-out infinite;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-15px) scale(1.05); }
  }

  #overlayMsg {
    font-size: 20px;
    color: #bbb;
    margin-bottom: 35px;
    font-weight: 500;
  }

  #restartBtn {
    background: linear-gradient(135deg, #00d86a, #00a855);
    border: none;
    padding: 16px 50px;
    border-radius: 60px;
    color: white;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 2.5px;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 6px 25px rgba(0,220,110,0.5);
    text-transform: uppercase;
  }

  #restartBtn:hover {
    transform: scale(1.08) translateY(-3px);
    box-shadow: 0 10px 40px rgba(0,220,110,0.7);
    background: linear-gradient(135deg, #00ff7f, #00c96a);
  }

  #restartBtn:active {
    transform: scale(0.98);
  }

  .kickEffect {
    position: absolute;
    pointer-events: none;
    font-size: 32px;
    animation: kickAnim 0.7s ease-out forwards;
    z-index: 5;
    filter: drop-shadow(0 0 10px currentColor);
  }

  @keyframes kickAnim {
    0% { opacity: 1; transform: scale(0.4) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.8) rotate(180deg); }
    100% { opacity: 0; transform: scale(2.5) translateY(-40px) rotate(360deg); }
  }

  .goalFlash {
    animation: goalFlashAnim 0.6s ease-in-out;
  }

  @keyframes goalFlashAnim {
    0%,100% { 
      box-shadow: 0 0 80px rgba(0,255,100,0.4);
      border-color: rgba(0,255,100,0.2);
    }
    50% { 
      box-shadow: 0 0 150px rgba(255,215,0,1), 0 0 250px rgba(255,165,0,0.7);
      border-color: rgba(255,215,0,0.8);
    }
  }

  #comboDisplay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 30px #ff8800, 0 0 60px #ff4400;
    pointer-events: none;
    opacity: 0;
    z-index: 8;
  }

  #comboDisplay.show {
    animation: comboAnim 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes comboAnim {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-20deg); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.4) rotate(5deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-80px) rotate(0deg); }
  }

  #statsPanel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 12px;
    color: #aaa;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    display: none;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin: 4px 0;
  }

  .stat-label { color: #888; }
  .stat-value { color: #fff; font-weight: 700; }

  @keyframes fieldGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
  }

  #soundToggle {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  #soundToggle:hover {
    background: rgba(0,0,0,0.9);
    transform: scale(1.1);
  }
</style>
</head>
<body>

<div id="gameContainer">
  <button id="soundToggle" onclick="toggleSound()">🔊</button>

  <div id="scoreBoard">
    <div class="playerScore">
      <span class="playerLabel redLabel">🔴 قرمز</span>
      <span class="scoreNum" id="scoreRed">0</span>
    </div>
    <div>
      <div class="scoreSep">—</div>
      <div id="timerDisplay">⏱ 3:00</div>
    </div>
    <div class="playerScore">
      <span class="playerLabel blueLabel">🔵 آبی</span>
      <span class="scoreNum" id="scoreBlue">0</span>
    </div>
  </div>

  <canvas id="gameCanvas" width="1000" height="550"></canvas>

  <div id="gameOverlay">
    <div id="overlayTitle"></div>
    <div id="overlayMsg"></div>
    <button id="restartBtn" onclick="restartGame()">🔄 بازی دوباره</button>
  </div>

  <div id="comboDisplay"></div>
  
  <div id="statsPanel">
    <div class="stat-row">
      <span class="stat-label">شوت‌ها:</span>
      <span class="stat-value" id="statShots">0 - 0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">مالکیت توپ:</span>
      <span class="stat-value" id="statPossession">50% - 50%</span>
    </div>
  </div>
</div>

<div id="controls">
  <span class="ctrl-red">🔴 حرکت: W A S D &nbsp;|&nbsp; شوت: SPACE &nbsp;|&nbsp; شوت قدرتی: نگه‌دار SPACE</span>
  <span class="ctrl-blue">🔵 حرکت: ↑ ↓ ← → &nbsp;|&nbsp; شوت: ENTER &nbsp;|&nbsp; شوت قدرتی: نگه‌دار ENTER</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

const GOAL_W = 15;
const GOAL_H = 140;
const GOAL_Y = (H - GOAL_H) / 2;

const PLAYER_R = 24;
const BALL_R = 13;
const PLAYER_SPEED = 5.5;
const FRICTION = 0.985;
const BALL_FRICTION = 0.992;
const KICK_POWER = 14;
const MAX_POWER_KICK = 25;
const GAME_DURATION = 180;

let keys = {};
let scoreRed = 0, scoreBlue = 0;
let gameTime = GAME_DURATION;
let lastTime = 0;
let gameRunning = true;
let goalCooldown = 0;
let particles = [];
let comboCounter = { red: 0, blue: 0 };
let lastScorer = null;
let soundEnabled = true;

let stats = {
  red: { shots: 0, possession: 0 },
  blue: { shots: 0, possession: 0 }
};

let players = {
  red: {
    x: W * 0.25, y: H / 2,
    vx: 0, vy: 0,
    color: '#ff3333',
    glow: '#ff0000',
    shadow: '#990000',
    kickCooldown: 0,
    powerCharge: 0,
    charging: false,
    stamina: 100,
    boost: 0,
    up: 'w', down: 's', left: 'a', right: 'd', kick: ' '
  },
  blue: {
    x: W * 0.75, y: H / 2,
    vx: 0, vy: 0,
    color: '#3366ff',
    glow: '#0044ff',
    shadow: '#001a99',
    kickCooldown: 0,
    powerCharge: 0,
    charging: false,
    stamina: 100,
    boost: 0,
    up: 'arrowup', down: 'arrowdown', left: 'arrowleft', right: 'arrowright', kick: 'enter'
  }
};

let ball = { 
  x: W / 2, y: H / 2, 
  vx: 0, vy: 0, 
  spin: 0, 
  trail: [],
  lastTouched: null,
  airborne: 0,
  glow: 0
};

let gamepads = {};
let crowdNoise = 0;

window.addEventListener('gamepadconnected', e => { gamepads[e.gamepad.index] = e.gamepad; });
window.addEventListener('gamepaddisconnected', e => { delete gamepads[e.gamepad.index]; });

function getGamepads() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  return Array.from(gps).filter(g => g);
}

document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { 
  keys[e.key.toLowerCase()] = false; 
});

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
}

function playSound(type) {
  if (!soundEnabled) return;
  
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  switch(type) {
    case 'kick':
      oscillator.frequency.value = 150;
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.1);
      break;
    case 'goal':
      oscillator.frequency.value = 440;
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.5);
      break;
    case 'bounce':
      oscillator.frequency.value = 200;
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.05);
      break;
  }
}

function resetBall() {
  ball.x = W / 2;
  ball.y = H / 2;
  const angle = (Math.random() - 0.5) * Math.PI / 3;
  const speed = 4 + Math.random() * 2;
  ball.vx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
  ball.vy = Math.sin(angle) * speed;
  ball.spin = 0;
  ball.trail = [];
  ball.lastTouched = null;
  ball.airborne = 0;
  ball.glow = 0;
}

function resetPlayers() {
  players.red.x = W * 0.25; players.red.y = H / 2;
  players.red.vx = 0; players.red.vy = 0;
  players.red.stamina = 100; players.red.boost = 0;
  players.blue.x = W * 0.75; players.blue.y = H / 2;
  players.blue.vx = 0; players.blue.vy = 0;
  players.blue.stamina = 100; players.blue.boost = 0;
}

function spawnParticles(x, y, color, count, speed = 1) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (2 + Math.random() * 7) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - Math.random() * 2,
      life: 1,
      decay: 0.012 + Math.random() * 0.02,
      r: 2 + Math.random() * 7,
      color,
      gravity: 0.15
    });
  }
}

function showCombo(text) {
  const combo = document.getElementById('comboDisplay');
  combo.textContent = text;
  combo.classList.remove('show');
  void combo.offsetWidth;
  combo.classList.add('show');
}

function updatePhysics(dt) {
  if (!gameRunning || goalCooldown > 0) return;

  const gps = getGamepads();

  for (const [key, p] of Object.entries(players)) {
    let mx = 0, my = 0;

    if (keys[p.up])    my -= 1;
    if (keys[p.down])  my += 1;
    if (keys[p.left])  mx -= 1;
    if (keys[p.right]) mx += 1;

    const gpIdx = key === 'red' ? 0 : 1;
    const gp = gps[gpIdx];
    if (gp) {
      const ax = gp.axes[0], ay = gp.axes[1];
      if (Math.abs(ax) > 0.15) mx += ax;
      if (Math.abs(ay) > 0.15) my += ay;

      if (gp.buttons[12]?.pressed) my -= 1;
      if (gp.buttons[13]?.pressed) my += 1;
      if (gp.buttons[14]?.pressed) mx -= 1;
      if (gp.buttons[15]?.pressed) mx += 1;

      if ((gp.buttons[0]?.pressed || gp.buttons[2]?.pressed)) {
        if (!p.charging && p.kickCooldown <= 0) {
          p.charging = true;
          p.powerCharge = 0;
        }
      } else {
        if (p.charging) {
          tryKick(p, key, p.powerCharge);
          p.charging = false;
          p.powerCharge = 0;
          p.kickCooldown = 25;
        }
      }
    }

    const len = Math.sqrt(mx * mx + my * my);
    if (len > 0) { mx /= len; my /= len; }

    const speedMult = p.stamina > 20 ? 1 : 0.65;
    const boostMult = p.boost > 0 ? 1.4 : 1;
    
    p.vx += mx * PLAYER_SPEED * 0.45 * speedMult * boostMult;
    p.vy += my * PLAYER_SPEED * 0.45 * speedMult * boostMult;

    const maxSpeed = PLAYER_SPEED * speedMult * boostMult;
    const pspeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (pspeed > maxSpeed) {
      p.vx = (p.vx / pspeed) * maxSpeed;
      p.vy = (p.vy / pspeed) * maxSpeed;
    }

    if (pspeed > 2.5 && p.stamina > 0) {
      p.stamina -= p.boost > 0 ? 0.15 : 0.07;
    } else if (p.stamina < 100) {
      p.stamina += 0.18;
    }
    p.stamina = Math.max(0, Math.min(100, p.stamina));

    if (p.boost > 0) p.boost--;

    p.vx *= FRICTION;
    p.vy *= FRICTION;
    p.x += p.vx;
    p.y += p.vy;

    p.x = Math.max(PLAYER_R, Math.min(W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(H - PLAYER_R, p.y));

    if (p.kickCooldown > 0) p.kickCooldown--;

    if (keys[p.kick]) {
      if (!p.charging && p.kickCooldown <= 0) {
        p.charging = true;
        p.powerCharge = 0;
      }
      if (p.charging && p.powerCharge < 100) {
        p.powerCharge += 2.8;
      }
    } else {
      if (p.charging) {
        tryKick(p, key, p.powerCharge);
        p.charging = false;
        p.powerCharge = 0;
        p.kickCooldown = 25;
      }
    }

    // ذرات حرکت
    if (pspeed > 3 && Math.random() < 0.3) {
      spawnParticles(p.x - p.vx * 2, p.y - p.vy * 2, p.color, 1, 0.5);
    }
  }

  // برخورد بازیکنان
  const dx = players.blue.x - players.red.x;
  const dy = players.blue.y - players.red.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < PLAYER_R * 2 && dist > 0) {
    const nx = dx / dist, ny = dy / dist;
    const overlap = PLAYER_R * 2 - dist;
    players.red.x -= nx * overlap * 0.5;
    players.red.y -= ny * overlap * 0.5;
    players.blue.x += nx * overlap * 0.5;
    players.blue.y += ny * overlap * 0.5;
    
    const relVx = players.red.vx - players.blue.vx;
    const relVy = players.red.vy - players.blue.vy;
    const dot = relVx * nx + relVy * ny;
    if (dot > 0) {
      players.red.vx -= dot * nx * 0.8;
      players.red.vy -= dot * ny * 0.8;
      players.blue.vx += dot * nx * 0.8;
      players.blue.vy += dot * ny * 0.8;
      spawnParticles((players.red.x + players.blue.x) / 2, (players.red.y + players.blue.y) / 2, '#ffffff', 12, 0.8);
      playSound('bounce');
    }
  }

  // دنباله توپ
  ball.trail.push({ x: ball.x, y: ball.y, glow: ball.glow });
  if (ball.trail.length > 20) ball.trail.shift();

  ball.vx *= BALL_FRICTION;
  ball.vy *= BALL_FRICTION;
  ball.spin *= 0.97;
  
  if (ball.airborne > 0) {
    ball.airborne--;
  }
  
  if (ball.glow > 0) ball.glow--;
  
  ball.x += ball.vx;
  ball.y += ball.vy;

  // برخورد با دیوارها
  if (ball.y - BALL_R < 0) { 
    ball.y = BALL_R; 
    ball.vy *= -0.85; 
    ball.spin *= -0.6; 
    spawnParticles(ball.x, ball.y, '#ffffff', 8);
    playSound('bounce');
  }
  if (ball.y + BALL_R > H) { 
    ball.y = H - BALL_R; 
    ball.vy *= -0.85; 
    ball.spin *= -0.6; 
    spawnParticles(ball.x, ball.y, '#ffffff', 8);
    playSound('bounce');
  }

  // گل
  if (ball.x - BALL_R < 0) {
    if (ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
      handleGoal('blue');
    } else {
      ball.x = BALL_R; ball.vx *= -0.85;
      spawnParticles(ball.x, ball.y, '#ffffff', 8);
      playSound('bounce');
    }
  }
  if (ball.x + BALL_R > W) {
    if (ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
      handleGoal('red');
    } else {
      ball.x = W - BALL_R; ball.vx *= -0.85;
      spawnParticles(ball.x, ball.y, '#ffffff', 8);
      playSound('bounce');
    }
  }

  // برخورد با بازیکنان
  for (const [pkey, p] of Object.entries(players)) {
    const bx = ball.x - p.x, by = ball.y - p.y;
    const bd = Math.sqrt(bx * bx + by * by);
    if (bd < PLAYER_R + BALL_R && bd > 0) {
      const nx = bx / bd, ny = by / bd;
      ball.x = p.x + nx * (PLAYER_R + BALL_R + 1);
      ball.y = p.y + ny * (PLAYER_R + BALL_R + 1);
      
      const dot = (ball.vx - p.vx) * nx + (ball.vy - p.vy) * ny;
      if (dot < 0) {
             ball.vx -= dot * nx * 1.5;
        ball.vy -= dot * ny * 1.5;
        ball.spin += (p.vx * -ny + p.vy * nx) * 0.15;
        ball.lastTouched = pkey;
        ball.glow = 15;
        spawnParticles(ball.x, ball.y, p.color, 10);
        playSound('bounce');
        
        stats[pkey].possession++;
      }
    }
  }

  // آپدیت ذرات
  particles = particles.filter(p => {
    p.x += p.vx; 
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    return p.life > 0;
  });

  gameTime -= dt / 60;
  if (gameTime <= 0) {
    gameTime = 0;
    endGame();
  }
}

function tryKick(player, playerKey, power) {
  const dx = ball.x - player.x;
  const dy = ball.y - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  if (dist < PLAYER_R + BALL_R + 30) {
    const nx = dx / dist || 1, ny = dy / dist || 0;
    const kickStrength = KICK_POWER + (power / 100) * (MAX_POWER_KICK - KICK_POWER);
    
    ball.vx = nx * kickStrength + player.vx * 0.7;
    ball.vy = ny * kickStrength + player.vy * 0.7;
    ball.spin = player.vx * 0.3;
    ball.lastTouched = playerKey;
    ball.airborne = power > 50 ? 35 : 20;
    ball.glow = 25;
    
    stats[playerKey].shots++;
    
    const particleCount = 18 + Math.floor(power / 4);
    spawnParticles(ball.x, ball.y, playerKey === 'red' ? '#ff6666' : '#6688ff', particleCount, 1.2 + power / 80);
    
    showKickEffect(ball.x, ball.y, power > 75 ? '💥' : power > 50 ? '⚡' : '⚽');
    
    if (power > 85) {
      showCombo('🔥 شوت آتشین!');
      player.boost = 30;
    } else if (power > 60) {
      showCombo('⚡ شوت قدرتمند!');
    }
    
    playSound('kick');
  }
}

function showKickEffect(x, y, emoji) {
  const el = document.createElement('div');
  el.className = 'kickEffect';
  el.textContent = emoji;
  el.style.left = (x + 30) + 'px';
  el.style.top = (y + 110) + 'px';
  document.getElementById('gameContainer').appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function handleGoal(scorer) {
  if (goalCooldown > 0) return;
  goalCooldown = 200;

  const scoreEl = scorer === 'red' ? document.getElementById('scoreRed') : document.getElementById('scoreBlue');
  
  if (scorer === 'red') { 
    scoreRed++; 
    scoreEl.textContent = scoreRed;
  } else { 
    scoreBlue++; 
    scoreEl.textContent = scoreBlue;
  }
  
  scoreEl.classList.add('scored');
  setTimeout(() => scoreEl.classList.remove('scored'), 600);

  if (lastScorer === scorer) {
    comboCounter[scorer]++;
    if (comboCounter[scorer] >= 2) {
      showCombo(`🔥 ${comboCounter[scorer]}x کمبو!`);
    }
  } else {
    comboCounter[scorer] = 1;
    if (lastScorer) comboCounter[lastScorer] = 0;
  }
  lastScorer = scorer;

  spawnParticles(ball.x, ball.y, scorer === 'red' ? '#ff4444' : '#4488ff', 100, 1.8);
  spawnParticles(ball.x, ball.y, '#ffd700', 80, 1.5);
  spawnParticles(ball.x, ball.y, '#ffffff', 60, 1.2);

  canvas.classList.add('goalFlash');
  setTimeout(() => canvas.classList.remove('goalFlash'), 600);
  
  playSound('goal');
  crowdNoise = 60;

  setTimeout(() => {
    resetBall();
    resetPlayers();
    goalCooldown = 0;
  }, 2000);
}

function endGame() {
  gameRunning = false;
  const overlay = document.getElementById('gameOverlay');
  const title = document.getElementById('overlayTitle');
  const msg = document.getElementById('overlayMsg');
  overlay.style.display = 'flex';

  const totalPoss = stats.red.possession + stats.blue.possession || 1;
  const redPoss = Math.round((stats.red.possession / totalPoss) * 100);
  const bluePoss = 100 - redPoss;

  if (scoreRed > scoreBlue) {
    title.style.color = '#ff4444';
    title.textContent = '🔴 قرمز برنده شد!';
    msg.textContent = `${scoreRed} - ${scoreBlue} | شوت‌ها: ${stats.red.shots} - ${stats.blue.shots} | مالکیت: ${redPoss}% - ${bluePoss}% 🏆`;
  } else if (scoreBlue > scoreRed) {
    title.style.color = '#4488ff';
    title.textContent = '🔵 آبی برنده شد!';
    msg.textContent = `${scoreBlue} - ${scoreRed} | شوت‌ها: ${stats.blue.shots} - ${stats.red.shots} | مالکیت: ${bluePoss}% - ${redPoss}% 🏆`;
  } else {
    title.style.color = '#ffd700';
    title.textContent = '🤝 مساوی!';
    msg.textContent = `${scoreRed} - ${scoreBlue} | شوت‌ها: ${stats.red.shots} - ${stats.blue.shots} | مالکیت: ${redPoss}% - ${bluePoss}%`;
  }
}

function restartGame() {
  scoreRed = 0; scoreBlue = 0;
  document.getElementById('scoreRed').textContent = '0';
  document.getElementById('scoreBlue').textContent = '0';
  gameTime = GAME_DURATION;
  gameRunning = true;
  goalCooldown = 0;
  particles = [];
  comboCounter = { red: 0, blue: 0 };
  lastScorer = null;
  stats = {
    red: { shots: 0, possession: 0 },
    blue: { shots: 0, possession: 0 }
  };
  resetBall();
  resetPlayers();
  document.getElementById('gameOverlay').style.display = 'none';
}

function drawField() {
  const fieldGrad = ctx.createLinearGradient(0, 0, 0, H);
  fieldGrad.addColorStop(0, '#1a6030');
  fieldGrad.addColorStop(0.5, '#1e7035');
  fieldGrad.addColorStop(1, '#1a6030');
  ctx.fillStyle = fieldGrad;
  ctx.fillRect(0, 0, W, H);

  // نوارهای چمن
  for (let i = 0; i < 10; i++) {
    if (i % 2 === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(i * (W / 10), 0, W / 10, H);
    }
  }

  // خط وسط
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 6]);
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // دایره وسط
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 75, 0, Math.PI * 2);
  ctx.stroke();

  // نقطه وسط
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 5, 0, Math.PI * 2);
  ctx.fill();

  // محوطه جریمه چپ
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(GOAL_W, GOAL_Y - 35, 110, GOAL_H + 70);
  ctx.strokeRect(GOAL_W, GOAL_Y + 25, 55, GOAL_H - 50);

  // نقطه پنالتی چپ
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(GOAL_W + 75, H / 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // محوطه جریمه راست
  ctx.strokeRect(W - GOAL_W - 110, GOAL_Y - 35, 110, GOAL_H + 70);
  ctx.strokeRect(W - GOAL_W - 55, GOAL_Y + 25, 55, GOAL_H - 50);

  // نقطه پنالتی راست
  ctx.beginPath();
  ctx.arc(W - GOAL_W - 75, H / 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // گوشه‌های زمین
  const cornerR = 18;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  
  ctx.beginPath();
  ctx.arc(0, 0, cornerR, 0, Math.PI / 2);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(W, 0, cornerR, Math.PI / 2, Math.PI);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(0, H, cornerR, -Math.PI / 2, 0);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(W, H, cornerR, Math.PI, Math.PI * 1.5);
  ctx.stroke();

  drawGoal(0, 'left');
  drawGoal(W, 'right');
}

function drawGoal(x, side) {
  const gx = side === 'left' ? 0 : x - GOAL_W;

  // سایه عمیق
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(gx - 4, GOAL_Y - 4, GOAL_W + 8, GOAL_H + 8);

  // پس‌زمینه گل
  ctx.fillStyle = 'rgba(5,5,5,0.9)';
  ctx.fillRect(gx, GOAL_Y, GOAL_W, GOAL_H);

  // شبکه گل
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  for (let i = 4; i < GOAL_W; i += 7) {
    ctx.beginPath();
    ctx.moveTo(gx + i, GOAL_Y);
    ctx.lineTo(gx + i, GOAL_Y + GOAL_H);
    ctx.stroke();
  }
  
  for (let j = GOAL_Y + 7; j < GOAL_Y + GOAL_H; j += 14) {
    ctx.beginPath();
    ctx.moveTo(gx, j);
    ctx.lineTo(gx + GOAL_W, j);
    ctx.stroke();
  }

  // چارچوب گل
  ctx.strokeStyle = side === 'left' ? 'rgba(255,100,100,0.95)' : 'rgba(100,150,255,0.95)';
  ctx.lineWidth = 5;
  ctx.shadowColor = side === 'left' ? '#ff4444' : '#4488ff';
  ctx.shadowBlur = 15;
  ctx.strokeRect(gx, GOAL_Y, GOAL_W, GOAL_H);
  ctx.shadowBlur = 0;

  // آیکون گل
  ctx.font = 'bold 16px Segoe UI';
  ctx.textAlign = 'center';
  const lx = side === 'left' ? GOAL_W / 2 : W - GOAL_W / 2;
  ctx.fillStyle = side === 'left' ? 'rgba(255,100,100,1)' : 'rgba(100,150,255,1)';
  ctx.shadowColor = side === 'left' ? '#ff0000' : '#0044ff';
  ctx.shadowBlur = 10;
  ctx.fillText('🥅', lx, GOAL_Y - 12);
  ctx.shadowBlur = 0;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawBall() {
  // دنباله توپ
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.5;
    const size = BALL_R * (i / ball.trail.length) * 0.95;
    ctx.save();
    ctx.globalAlpha = alpha;
    
    const trailGrad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, size);
    trailGrad.addColorStop(0, t.glow > 0 ? '#ffff00' : '#ffffff');
    trailGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = trailGrad;
    ctx.shadowColor = t.glow > 0 ? '#ffaa00' : '#88aaff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // سایه توپ
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  const shadowOffset = ball.airborne > 0 ? 10 + ball.airborne * 0.4 : 5;
  const shadowSize = ball.airborne > 0 ? BALL_R * 0.5 : BALL_R * 0.9;
  ctx.ellipse(ball.x, ball.y + BALL_R + shadowOffset, shadowSize, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // خود توپ
  ctx.save();
  ctx.translate(ball.x, ball.y - (ball.airborne > 0 ? ball.airborne * 0.25 : 0));
  ctx.rotate(ball.spin);

  const ballGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, BALL_R);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.3, '#f8f8f8');
  ballGrad.addColorStop(0.7, '#e5e5e5');
  ballGrad.addColorStop(1, '#b5b5b5');

  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(0, 0, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // طرح فوتبال
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#222';
  
  // پنج‌ضلعی مرکزی
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * Math.PI * 2 / 5) - Math.PI / 2;
    const x = Math.cos(angle) * 5;
    const y = Math.sin(angle) * 5;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // شش‌ضلعی‌ها
  const hexPositions = [
    {x: 0, y: -9}, {x: 8, y: -5}, {x: 8, y: 5},
    {x: 0, y: 9}, {x: -8, y: 5}, {x: -8, y: -5}
  ];
  
  hexPositions.forEach(pos => {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI / 3);
      const x = pos.x + Math.cos(angle) * 3;
      const y = pos.y + Math.sin(angle) * 3;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  });

  ctx.restore();

  // افکت گلو
  const ballSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (ballSpeed > 9 || ball.glow > 0) {
    ctx.save();
    ctx.globalAlpha = ball.glow > 0 ? 0.7 : Math.min(0.6, (ballSpeed - 9) / 18);
    const glowGrad = ctx.createRadialGradient(ball.x, ball.y - (ball.airborne > 0 ? ball.airborne * 0.25 : 0), 0, ball.x, ball.y - (ball.airborne > 0 ? ball.airborne * 0.25 : 0), BALL_R + 8);
    glowGrad.addColorStop(0, ball.glow > 0 ? '#ffff00' : '#ffffff');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.shadowColor = ball.glow > 0 ? '#ffaa00' : '#ffff00';
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y - (ball.airborne > 0 ? ball.airborne * 0.25 : 0), BALL_R + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(p, name) {
  const x = p.x, y = p.y;
  const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);

  // سایه بازیکن
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(x, y + PLAYER_R + 4, PLAYER_R * 0.85, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // گلو حرکت
  if (speed > 2 || p.boost > 0) {
    ctx.save();
    ctx.shadowColor = p.glow;
    ctx.shadowBlur = p.boost > 0 ? 30 : 20 + speed * 7;
    ctx.globalAlpha = p.boost > 0 ? 0.7 : 0.5;
    ctx.fillStyle = p.glow;
    ctx.beginPath();
    ctx.arc(x, y, PLAYER_R + 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // بدنه بازیکن
  const grad = ctx.createRadialGradient(x - 8, y - 8, 4, x, y, PLAYER_R);
  grad.addColorStop(0, lightenColor(p.color, 90));
  grad.addColorStop(0.4, lightenColor(p.color, 50));
  grad.addColorStop(0.7, p.color);
  grad.addColorStop(1, p.shadow);

  ctx.save();
  ctx.shadowColor = p.glow;
  ctx.shadowBlur = 18;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, PLAYER_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // حلقه بیرونی
  ctx.save();
  ctx.strokeStyle = lightenColor(p.color, 70);
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.arc(x, y, PLAYER_R + 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // شماره بازیکن
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,1)';
  ctx.font = 'bold 18px Segoe UI';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 5;
  ctx.fillText(name === 'red' ? '1' : '2', x, y);
  ctx.restore();

  // نشانگر جهت
  if (speed > 1) {
    const angle = Math.atan2(p.vy, p.vx);
    ctx.save();
    ctx.strokeStyle = lightenColor(p.color, 80);
    ctx.globalAlpha = 0.8;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.shadowColor = p.glow;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * PLAYER_R, y + Math.sin(angle) * PLAYER_R);
    ctx.lineTo(x + Math.cos(angle) * (PLAYER_R + speed * 4), y + Math.sin(angle) * (PLAYER_R + speed * 4));
    ctx.stroke();
    
    // سر فلش
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * (PLAYER_R + speed * 4), y + Math.sin(angle) * (PLAYER_R + speed * 4));
    ctx.lineTo(
      x + Math.cos(angle - 0.5) * (PLAYER_R + speed * 3.5),
      y + Math.sin(angle - 0.5) * (PLAYER_R + speed * 3.5)
    );
    ctx.moveTo(x + Math.cos(angle) * (PLAYER_R + speed * 4), y + Math.sin(angle) * (PLAYER_R + speed * 4));
    ctx.lineTo(
      x + Math.cos(angle + 0.5) * (PLAYER_R + speed * 3.5),
      y + Math.sin(angle + 0.5) * (PLAYER_R + speed * 3.5)
    );
    ctx.stroke();
    ctx.restore();
  }

  // نوار استامینا
  if (p.stamina < 100) {
    const barW = PLAYER_R * 1.6;
    const barH = 5;
    const barX = x - barW / 2;
    const barY = y - PLAYER_R - 14;
    
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(barX, barY, barW, barH);
    
    const staminaColor = p.stamina > 50 ? '#00ff00' : p.stamina > 20 ? '#ffff00' : '#ff0000';
    ctx.fillStyle = staminaColor;
    ctx.shadowColor = staminaColor;
    ctx.shadowBlur = 8;
    ctx.fillRect(barX, barY, barW * (p.stamina / 100), barH);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.restore();
  }

  // نوار شارژ شوت
  if (p.charging && p.powerCharge > 0) {
    const barW = PLAYER_R * 2.2;
    const barH = 7;
    const barX = x - barW / 2;
    const barY = y + PLAYER_R + 18;
    
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(barX, barY, barW, barH);
    
    const powerGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    powerGrad.addColorStop(0, '#00ff00');
    powerGrad.addColorStop(0.5, '#ffff00');
    powerGrad.addColorStop(1, '#ff0000');
    ctx.fillStyle = powerGrad;
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.powerCharge > 70 ? '#ff0000' : '#ffff00';
    ctx.fillRect(barX, barY, barW * (p.powerCharge / 100), barH);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.restore();
  }

  // افکت بوست
  if (p.boost > 0) {
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(x, y, PLAYER_R + 10 + Math.sin(Date.now() / 100) * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function lightenColor(color, amount) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function drawGoalText() {
  if (goalCooldown > 120) {
    const alpha = Math.min(1, (goalCooldown - 120) / 80);
    const scale = 1 + (1 - alpha) * 0.4;
    
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    
    ctx.font = 'bold 100px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 50;
    ctx.fillText('⚽ GOAL!', 0, 0);
    
    ctx.font = 'bold 35px Segoe UI';
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 25;
    ctx.fillText('گل!', 0, 60);
    
    ctx.restore();
  }
}

function updateTimerDisplay() {
  const m = Math.floor(gameTime / 60);
  const s = Math.floor(gameTime % 60);
  const timerEl = document.getElementById('timerDisplay');
  timerEl.textContent = `⏱ ${m}:${s.toString().padStart(2, '0')}`;
  
  if (gameTime < 30 && gameTime > 0) {
    timerEl.classList.add('warning');
  } else {
    timerEl.classList.remove('warning');
  }
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  updatePhysics(dt * 60);
  updateTimerDisplay();

  ctx.clearRect(0, 0, W, H);
  drawField();
  drawParticles();
  drawPlayer(players.red, 'red');
  drawPlayer(players.blue, 'blue');
  drawBall();
  drawGoalText();

  if (goalCooldown > 0) goalCooldown--;
  if (crowdNoise > 0) crowdNoise--;

  requestAnimationFrame(gameLoop);
}

resetBall();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
<script>
// موسیقی پس‌زمینه باحال و قشنگ برای فوتبال
let musicContext = null;
let musicStarted = false;
let musicInterval = null;
let bassInterval = null;
let padInterval = null;

function startBackgroundMusic() {
  if (musicStarted || !soundEnabled) return;
  musicStarted = true;

  musicContext = new (window.AudioContext || window.webkitAudioContext)();
  const masterGain = musicContext.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(musicContext.destination);

  // نت‌های باحال و ملودیک
  const notes = {
    C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00,
    A3: 220.00, B3: 246.94, C4: 261.63, D4: 293.66, E4: 329.63,
    F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25,
    D5: 587.33, E5: 659.25, G5: 783.99
  };

  // ملودی‌های کچی و باحال - مثل آهنگ‌های ورزشی معروف
  const catchyMelodies = [
    [notes.C4, notes.E4, notes.G4, notes.E4, notes.C5, notes.G4],
    [notes.A3, notes.C4, notes.E4, notes.A4, notes.E4, notes.C4],
    [notes.G3, notes.B3, notes.D4, notes.G4, notes.D4, notes.B3],
    [notes.F3, notes.A3, notes.C4, notes.F4, notes.C4, notes.A3],
    [notes.E4, notes.G4, notes.B4, notes.E5, notes.B4, notes.G4],
    [notes.D4, notes.F4, notes.A4, notes.D5, notes.A4, notes.F4]
  ];

  let melodyIndex = 0;

  // بیس لاین قدرتمند - ریتم محکم
  function playBassLine() {
    if (!soundEnabled || !musicContext) return;

    const now = musicContext.currentTime;
    const bassNotes = [notes.C3, notes.C3, notes.G3, notes.C3];
    
    bassNotes.forEach((freq, i) => {
      const startTime = now + (i * 0.25);
      
      const bass = musicContext.createOscillator();
      const bassGain = musicContext.createGain();
      const filter = musicContext.createBiquadFilter();
      
      bass.type = 'triangle';
      bass.frequency.value = freq;
      
      filter.type = 'lowpass';
      filter.frequency.value = 300;
      filter.Q.value = 5;
      
      bassGain.gain.setValueAtTime(0.2, startTime);
      bassGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
      
      bass.connect(filter);
      filter.connect(bassGain);
      bassGain.connect(masterGain);
      bass.start(startTime);
      bass.stop(startTime + 0.25);
    });
  }

  // پد هارمونیک - فضاسازی قشنگ
  function playPad() {
    if (!soundEnabled || !musicContext) return;

    const now = musicContext.currentTime;
    const chordNotes = [notes.C4, notes.E4, notes.G4];
    
    chordNotes.forEach(freq => {
      const pad = musicContext.createOscillator();
      const padGain = musicContext.createGain();
      const filter = musicContext.createBiquadFilter();
      
      pad.type = 'sine';
      pad.frequency.value = freq;
      
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      filter.Q.value = 1;
      
      padGain.gain.setValueAtTime(0, now);
      padGain.gain.linearRampToValueAtTime(0.015, now + 0.3);
      padGain.gain.setValueAtTime(0.015, now + 1.5);
      padGain.gain.linearRampToValueAtTime(0.001, now + 2);
      
      pad.connect(filter);
      filter.connect(padGain);
      padGain.connect(masterGain);
      pad.start(now);
      pad.stop(now + 2);
    });
  }

  // ملودی اصلی - کچی و جذاب
  function playMelody() {
    if (!soundEnabled || !musicContext) return;

    const melody = catchyMelodies[melodyIndex];
    const now = musicContext.currentTime;
    const noteDuration = 0.35;
    const spacing = 0.4;

    melody.forEach((freq, i) => {
      const startTime = now + (i * spacing);
      
      // اسیلاتور اصلی - صدای روشن و واضح
      const osc = musicContext.createOscillator();
      const gain = musicContext.createGain();
      const filter = musicContext.createBiquadFilter();
      
      osc.type = 'square';
      osc.frequency.value = freq;
      
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(freq * 4, startTime);
      filter.frequency.exponentialRampToValueAtTime(freq * 2, startTime + noteDuration);
      filter.Q.value = 3;
      
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.exponentialRampToValueAtTime(0.06, startTime + 0.01);
      gain.gain.setValueAtTime(0.06, startTime + noteDuration - 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      osc.start(startTime);
      osc.stop(startTime + noteDuration);

      // هارمونیک بالا - درخشش
      const harmonic = musicContext.createOscillator();
      const harmonicGain = musicContext.createGain();
      
      harmonic.type = 'sine';
      harmonic.frequency.value = freq * 2;
      
      harmonicGain.gain.setValueAtTime(0, startTime);
      harmonicGain.gain.exponentialRampToValueAtTime(0.02, startTime + 0.01);
      harmonicGain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);
      
      harmonic.connect(harmonicGain);
      harmonicGain.connect(masterGain);
      harmonic.start(startTime);
      harmonic.stop(startTime + noteDuration);
    });

    melodyIndex = (melodyIndex + 1) % catchyMelodies.length;
    musicInterval = setTimeout(playMelody, 2500);
  }

  // شروع همه لایه‌ها
  playMelody();
  playPad();
  playBassLine();
  
  bassInterval = setInterval(playBassLine, 1000);
  padInterval = setInterval(playPad, 2000);
}

function stopBackgroundMusic() {
  if (musicInterval) {
    clearTimeout(musicInterval);
    musicInterval = null;
  }
  if (bassInterval) {
    clearInterval(bassInterval);
    bassInterval = null;
  }
  if (padInterval) {
    clearInterval(padInterval);
    padInterval = null;
  }
  if (musicContext) {
    musicContext.close();
    musicContext = null;
  }
  musicStarted = false;
}

document.addEventListener('click', startBackgroundMusic, { once: true });
document.addEventListener('keydown', startBackgroundMusic, { once: true });
window.addEventListener('beforeunload', stopBackgroundMusic);


</script>
